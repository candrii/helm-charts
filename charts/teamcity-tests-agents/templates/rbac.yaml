---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "teamcity-tests-agents.fullname" . }}-secret-writer
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create","update","patch","get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "teamcity-tests-agents.fullname" . }}-secret-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "teamcity-tests-agents.fullname" . }}-secret-writer
roleRef:
  kind: Role
  name: {{ include "teamcity-tests-agents.fullname" . }}-secret-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "teamcity-tests-agents.fullname" . }}-secret-writer

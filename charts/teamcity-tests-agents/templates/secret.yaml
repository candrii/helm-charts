{{ range .Values.deployments }}
---
kind: Secret
apiVersion: v1
metadata:
  name: {{ include "teamcity-tests-agents.fullname" $ }}-{{ .name }}
  labels:
    {{- include "teamcity-tests-agents.labels" $ | nindent 4 }}
    agent: {{ .name }}
stringData:
  SERVER_URL: {{ $.Values.teamcity.serverUrl | quote }}
  DOCKER_IN_DOCKER: "start"
  AGENT_NAME: {{ .name | quote }}
  AGENT_POOL: {{ default $.Values.default_agent_pool .agent_pool | quote }}

---
kind: Secret
apiVersion: v1
metadata:
  name: {{ include "teamcity-tests-agents.fullname" $ }}-{{ .name }}-scripts
  labels:
    {{- include "teamcity-tests-agents.labels" $ | nindent 4 }}
    agent: {{ .name }}
stringData:
  poststart.sh: |
    #!/bin/bash
    # Wait until the agent has registered with the server, then force the
    # configured name (TeamCity appends -N when a name collides), authorize
    # the agent, and add it to the target pool. Uses MACHINE_TOKEN (bearer).
    set -u
    LOG_FILE="/opt/buildagent/logs/teamcity-agent.log"

    api() {
      curl -fsk -H "Authorization: Bearer ${MACHINE_TOKEN}" "$@"
    }

    # Wait for the agent to finish registration
    while ! tail -200 "$LOG_FILE" 2>/dev/null | grep -q "Registered on server with id"; do
      sleep 2
    done

    AGENT_ID=$(tail -500 "$LOG_FILE" | grep -oE "Registered on server with id [0-9]+" | tail -1 | awk '{print $NF}')
    if [ -z "$AGENT_ID" ]; then
      echo "poststart: could not parse agent id from log" >&2
      exit 1
    fi
    echo "poststart: agent id=$AGENT_ID"

    # Force exact name (drops any -N suffix TeamCity assigned)
    CURRENT_NAME=$(api -H "Accept: text/plain" "${SERVER_URL}/app/rest/agents/id:${AGENT_ID}/name")
    if [ "$CURRENT_NAME" != "$AGENT_NAME" ]; then
      echo "poststart: renaming '$CURRENT_NAME' -> '$AGENT_NAME'"
      api -X PUT -H "Content-Type: text/plain" --data "$AGENT_NAME" \
        "${SERVER_URL}/app/rest/agents/id:${AGENT_ID}/name" >/dev/null
    fi

    # Authorize
    api -X PUT -H "Content-Type: text/plain" --data "true" \
      "${SERVER_URL}/app/rest/agents/id:${AGENT_ID}/authorized" >/dev/null

    # Assign to pool
    api -X POST -H "Content-Type: application/json" \
      -d "{\"id\": ${AGENT_ID}}" \
      "${SERVER_URL}/app/rest/agentPools/name:${AGENT_POOL}/agents" >/dev/null

    echo "poststart: ${AGENT_NAME} (id=${AGENT_ID}) authorized in pool ${AGENT_POOL}"
  prestop.sh: |
    #!/bin/bash
    # Stop the agent gracefully and remove its record from the server so the
    # name slot is freed for the next pod incarnation.
    set -u

    /opt/buildagent/bin/agent.sh stop force || true
    for pidfile in ${LOG_DIR}/*.pid; do
      [ -f "$pidfile" ] || continue
      while ps -p "$(cat "$pidfile")" &>/dev/null; do sleep 1; done
    done

    curl -fsk -X DELETE \
      -H "Authorization: Bearer ${MACHINE_TOKEN}" \
      "${SERVER_URL}/app/rest/agents/name:${AGENT_NAME}" \
      && echo "prestop: ${AGENT_NAME} removed from server" \
      || echo "prestop: ${AGENT_NAME} not present on server (already gone)"
{{- end }}

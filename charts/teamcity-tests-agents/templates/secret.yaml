{{ range .Values.deployments }}
---
kind: Secret
apiVersion: v1
metadata:
  name: {{ include "teamcity-tests-agents.fullname" $ }}-{{ .name }}
  labels:
    {{- include "teamcity-tests-agents.labels" $ | nindent 4 }}
    agent: {{ .name }}
stringData:
  SERVER_URL: {{ $.Values.teamcity.serverUrl | quote }}
  DOCKER_IN_DOCKER: "start"
  AGENT_NAME: {{ .name | quote }}
  AGENT_POOL: {{ default $.Values.default_agent_pool .agent_pool | quote }}

---
kind: Secret
apiVersion: v1
metadata:
  name: {{ include "teamcity-tests-agents.fullname" $ }}-{{ .name }}-scripts
  labels:
    {{- include "teamcity-tests-agents.labels" $ | nindent 4 }}
    agent: {{ .name }}
stringData:
  poststart.sh: |
    #!/bin/bash
    # Wait until the agent has registered with the server, then reclaim the
    # configured name: delete stale disconnected records left behind when a
    # previous pod died without running prestop (preStop is best-effort and
    # is skipped on abrupt node termination, e.g. GKE upgrades/auto-repair),
    # force the exact name, authorize the agent and add it to the target
    # pool. Uses MACHINE_TOKEN (bearer).
    set -u
    LOG_FILE="/opt/buildagent/logs/teamcity-agent.log"

    api() {
      curl -fsk -H "Authorization: Bearer ${MACHINE_TOKEN}" "$@"
    }

    # Wait for the agent to finish registration
    while ! tail -200 "$LOG_FILE" 2>/dev/null | grep -q "Registered on server with id"; do
      sleep 2
    done

    AGENT_ID=$(tail -500 "$LOG_FILE" | grep -oE "Registered on server with id [0-9]+" | tail -1 | awk '{print $NF}')
    if [ -z "$AGENT_ID" ]; then
      echo "poststart: could not parse agent id from log" >&2
      exit 1
    fi
    echo "poststart: agent id=$AGENT_ID"

    # Delete stale disconnected records named AGENT_NAME or AGENT_NAME-N.
    # Connected holders are left alone; the rename below then fails and the
    # container restarts, retrying until the holder is gone.
    api -H "Accept: application/json" \
      "${SERVER_URL}/app/rest/agents?locator=defaultFilter:false&fields=agent(id,name,connected)" |
      jq -r --arg name "$AGENT_NAME" --argjson id "$AGENT_ID" \
        '.agent[]? | select(.id != $id and .connected == false)
         | select(.name == $name or (.name | test("^" + $name + "-[0-9]+$")))
         | .id' |
      while read -r stale_id; do
        api -X DELETE "${SERVER_URL}/app/rest/agents/id:${stale_id}" \
          && echo "poststart: removed stale agent record id=${stale_id}"
      done

    # Force exact name (drops any -N suffix TeamCity assigned on collision)
    CURRENT_NAME=$(api -H "Accept: text/plain" "${SERVER_URL}/app/rest/agents/id:${AGENT_ID}/name")
    if [ "$CURRENT_NAME" != "$AGENT_NAME" ]; then
      echo "poststart: renaming '$CURRENT_NAME' -> '$AGENT_NAME'"
      api -X PUT -H "Content-Type: text/plain" --data "$AGENT_NAME" \
        "${SERVER_URL}/app/rest/agents/id:${AGENT_ID}/name" >/dev/null
      CURRENT_NAME=$(api -H "Accept: text/plain" "${SERVER_URL}/app/rest/agents/id:${AGENT_ID}/name")
      if [ "$CURRENT_NAME" != "$AGENT_NAME" ]; then
        echo "poststart: rename failed, agent is still '$CURRENT_NAME'" >&2
        exit 1
      fi
    fi

    # Authorize
    api -X PUT -H "Content-Type: text/plain" --data "true" \
      "${SERVER_URL}/app/rest/agents/id:${AGENT_ID}/authorized" >/dev/null

    # Assign to pool
    api -X POST -H "Content-Type: application/json" \
      -d "{\"id\": ${AGENT_ID}}" \
      "${SERVER_URL}/app/rest/agentPools/name:${AGENT_POOL}/agents" >/dev/null

    echo "poststart: ${AGENT_NAME} (id=${AGENT_ID}) authorized in pool ${AGENT_POOL}"
  prestop.sh: |
    #!/bin/bash
    # Stop the agent gracefully and remove its record from the server so the
    # name slot is freed for the next pod incarnation. Best-effort: poststart
    # reclaims the name if this never ran (abrupt node termination).
    set -u
    # Lifecycle hooks only see image ENV, not entrypoint exports
    LOG_DIR="${LOG_DIR:-/opt/buildagent/logs}"

    /opt/buildagent/bin/agent.sh stop force || true

    # Bounded wait for agent processes to exit: together with the API call
    # below this must fit within terminationGracePeriodSeconds
    deadline=$((SECONDS + 60))
    for pidfile in "${LOG_DIR}"/*.pid; do
      [ -f "$pidfile" ] || continue
      pid=$(cat "$pidfile" 2>/dev/null) || continue
      while ps -p "$pid" &>/dev/null && [ "$SECONDS" -lt "$deadline" ]; do
        sleep 1
      done
    done

    curl -fsk -X DELETE \
      -H "Authorization: Bearer ${MACHINE_TOKEN}" \
      "${SERVER_URL}/app/rest/agents/name:${AGENT_NAME}" \
      && echo "prestop: ${AGENT_NAME} removed from server" \
      || echo "prestop: ${AGENT_NAME} not present on server (already gone)"
{{- end }}

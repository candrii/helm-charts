---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "teamcity-server.fullname" . }}
  labels:
    {{- include "teamcity-server.labels" . | nindent 4 }}
  {{- if or .Values.service.annotations .Values.backendConfig.enabled }}
  annotations:
    {{- if .Values.backendConfig.enabled }}
    beta.cloud.google.com/backend-config: '{"default": "{{ include "teamcity-server.fullname" . }}"}'
    {{- end }}
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "teamcity-server.selectorLabels" . | nindent 4 }}

{{- if .Values.webHookIngress.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "teamcity-server.fullname" . }}-webhook
  labels:
    {{- include "teamcity-server.labels" . | nindent 4 }}
  {{- with .Values.webHookIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.webHookIngress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  tls:
    - hosts:
        - {{ .Values.webHookIngress.host }}
      secretName: {{ include "teamcity-server.fullname" . }}-webhook-tls
  rules:
    - host: {{ .Values.webHookIngress.host }}
      http:
        paths:
          - path: /app/webhooks/githubapp
            pathType: Prefix
            backend:
              service:
                name: {{ include "teamcity-server.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
{{- end }}
